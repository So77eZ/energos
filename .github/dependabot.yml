version: 2
updates:
  # Frontend (Next.js / npm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  # Backend (FastAPI / pip · pyproject.toml)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  # GitHub Actions (CI-воркфлоу: checkout / setup-node / codeql и т.п.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-all:
        update-types: [minor, patch]
