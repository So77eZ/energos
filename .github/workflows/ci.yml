name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Отменяем устаревшие прогоны при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Минимальные права GITHUB_TOKEN (checkout — contents:read достаточно).
permissions:
  contents: read

jobs:
  frontend:
    name: frontend · tsc · vitest · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Unit + FSD-boundaries (vitest)
        run: npx vitest run

      - name: Production build (next build)
        run: npx next build
