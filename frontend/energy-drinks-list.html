<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Энергетики — список</title>
    <link rel="stylesheet" href="energy-drinks-crud.css" />
  </head>
  <body>
    <div class="crud-wrap">
      <header class="crud-site-header">
        <div class="crud-site-header__bar">
          <a href="/" class="crud-site-brand">⚡ Energy Drinks</a>
          <div class="crud-site-header__cluster">
            <nav class="crud-nav" aria-label="Разделы">
              <a href="energy-drinks-list.html">Список</a>
              <a href="energy-drink-new.html">Создать</a>
              <a href="/">Каталог</a>
            </nav>
            <button
              type="button"
              class="crud-filter-btn"
              id="filterMenuBtn"
              aria-expanded="false"
              aria-controls="filterDropdown"
              title="Фильтры"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />
              </svg>
              <span class="visually-hidden">Открыть фильтры</span>
            </button>
          </div>
        </div>
        <div
          id="filterDropdown"
          class="crud-filter-dropdown"
          role="region"
          aria-label="Фильтры списка"
          hidden
        >
          <label class="crud-filter-field">
            <span>Поиск по названию</span>
            <input id="search" type="search" placeholder="Название…" />
          </label>
          <label class="crud-filter-field">
            <span>Сортировка</span>
            <select id="sort">
              <option value="id">по ID</option>
              <option value="name">по названию</option>
              <option value="price">по цене</option>
            </select>
          </label>
          <label class="crud-filter-field crud-filter-field--row">
            <input type="checkbox" id="sugarFilter" />
            <span>Только без сахара</span>
          </label>
        </div>
      </header>

      <h1>Энергетики</h1>
      <div id="msg" class="msg" role="status" aria-live="polite"></div>
      <p id="loading">Загрузка…</p>
      <table id="table" style="display: none">
        <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цена</th>
            <th>Без сахара</th>
            <th class="actions-col">Действия</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <script src="energy-drinks-api.js"></script>
    <script>
      const msg = document.getElementById("msg");
      const loading = document.getElementById("loading");
      const table = document.getElementById("table");
      const rows = document.getElementById("rows");
      const searchEl = document.getElementById("search");
      const sortEl = document.getElementById("sort");
      const sugarEl = document.getElementById("sugarFilter");

      let allData = [];

      function showErr(text) {
        msg.className = "msg err";
        msg.textContent = text;
      }

      function clearMsg() {
        msg.className = "msg";
        msg.textContent = "";
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function applyLocalFilters(data) {
        const q = searchEl.value.trim().toLowerCase();
        const sugarOnly = sugarEl.checked;
        let out = data.filter((d) => {
          if (sugarOnly && !d.no_sugar) return false;
          if (q && !String(d.name).toLowerCase().includes(q)) return false;
          return true;
        });
        const sort = sortEl.value;
        out = [...out];
        if (sort === "name") {
          out.sort((a, b) =>
            String(a.name).localeCompare(String(b.name), "ru")
          );
        } else if (sort === "price") {
          out.sort((a, b) => {
            const ap =
              a.price == null || a.price === "" ? Infinity : Number(a.price);
            const bp =
              b.price == null || b.price === "" ? Infinity : Number(b.price);
            return ap - bp;
          });
        } else {
          out.sort((a, b) => Number(a.id) - Number(b.id));
        }
        return out;
      }

      function renderTable(data) {
        rows.innerHTML = "";
        data.forEach((d) => {
          const tr = document.createElement("tr");
          const price =
            d.price != null && d.price !== "" ? String(d.price) : "—";
          tr.innerHTML = `
              <td>${d.id}</td>
              <td>${escapeHtml(d.name)}</td>
              <td>${escapeHtml(price)}</td>
              <td>${d.no_sugar ? "да" : "нет"}</td>
              <td class="actions"></td>`;
          const cell = tr.querySelector(".actions");
          const edit = document.createElement("a");
          edit.href = `energy-drink-edit.html?id=${d.id}`;
          edit.className = "btn-edit";
          edit.textContent = "Изменить";
          cell.appendChild(edit);
          const del = document.createElement("button");
          del.type = "button";
          del.className = "danger";
          del.textContent = "Удалить";
          del.addEventListener("click", () => removeRow(d.id, d.name));
          cell.appendChild(del);
          rows.appendChild(tr);
        });
      }

      async function refresh() {
        clearMsg();
        loading.style.display = "block";
        table.style.display = "none";
        rows.innerHTML = "";
        try {
          allData = await EnergyDrinksAPI.list();
          loading.style.display = "none";
          table.style.display = "";
          renderTable(applyLocalFilters(allData));
        } catch (e) {
          loading.style.display = "none";
          showErr(e.message || "Не удалось загрузить список");
        }
      }

      function onFilterChange() {
        if (!allData.length) return;
        clearMsg();
        renderTable(applyLocalFilters(allData));
      }

      async function removeRow(id, name) {
        if (!confirm(`Удалить «${name}»?`)) return;
        try {
          await EnergyDrinksAPI.remove(id);
          await refresh();
        } catch (e) {
          showErr(e.message || "Ошибка удаления");
        }
      }

      function setupFilterMenu() {
        const btn = document.getElementById("filterMenuBtn");
        const panel = document.getElementById("filterDropdown");
        if (!btn || !panel) return;

        function closePanel() {
          panel.hidden = true;
          btn.setAttribute("aria-expanded", "false");
        }

        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const open = panel.hidden;
          panel.hidden = !open;
          btn.setAttribute("aria-expanded", open ? "true" : "false");
        });

        document.addEventListener("click", () => {
          if (!panel.hidden) closePanel();
        });
        panel.addEventListener("click", (e) => e.stopPropagation());
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closePanel();
        });
      }

      searchEl.addEventListener("input", onFilterChange);
      sortEl.addEventListener("change", onFilterChange);
      sugarEl.addEventListener("change", onFilterChange);

      setupFilterMenu();
      refresh();
    </script>
  </body>
</html>
