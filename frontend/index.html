<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Energy Drinks</title>
    <link rel="stylesheet" href="styleTest.css" />
  </head>
  <body>
    <h1>Список энергетиков</h1>
    <ul id="list"></ul>

    <h2>Добавить новый</h2>

    <input type="text" id="name" placeholder="Название" /><br />
    <input type="number" id="price" placeholder="Цена" /><br />
    <input
      type="number"
      id="acidity"
      min="1"
      max="5"
      placeholder="Кислотность (1-5)"
    /><br />
    <input
      type="number"
      id="sweetness"
      min="1"
      max="5"
      placeholder="Сладость (1-5)"
    /><br />
    <input
      type="number"
      id="concentration"
      min="1"
      max="5"
      placeholder="Концентрация (1-5)"
    /><br />
    <input
      type="number"
      id="carbonation"
      min="1"
      max="5"
      placeholder="Газ (1-5)"
    /><br />
    <input
      type="number"
      id="aftertaste"
      min="1"
      max="5"
      placeholder="Послевкусие (1-5)"
    /><br />
    <input
      type="number"
      id="price_quality"
      min="1"
      max="5"
      placeholder="Цена/качество (1-5)"
    /><br />

    <p>Без сахара</p>
    <input type="checkbox" id="no_sugar" /><br /><br />

    <button onclick="createDrink()">Создать</button>

    <script src="front-back-test.js"></script>
  </body>
</html>
